<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Alias</title>
        <link rel="preconnect" href="https://rsms.me/">
        <link rel="stylesheet" href="style.css"  type="text/css" />
    </head>
  <body>
<div class="container">
<div id="teamContainer"></div>
<div id="counter"></div>
<div id="startMenu">
  <div class="name">Alias</div>
  <input id="selectTime" type="number" placeholder="Round time">
  <input id="selectPoints" type="number" placeholder="Maximum points">
  <input id="TeamA" type="text" placeholder="name of 1 team">
  <input id="TeamB" type="text" placeholder="name of 2 team">
  
  <button id="level1">level 1</button>
  <button id="level2">level 2</button>
  <button id="level3">level 3</button>
  <button id="start">start</button>
</div>

<div id="generatorRandomWords">
  <div id="output"></div>
  <div id="timer">timer</div>
  <button id="yes">Yes</button>
  <button id="no">No</button>
  <button id="eng">Eng</button>
  <button id="exit">Exit</button>
</div>
  <button id="next">Next team</button>
</div>
<script src="main.js">
      </script>
  </body>
</html>
